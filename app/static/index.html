<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Monitoramento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: "Segoe UI", Arial;
            background: #0b1220;
            color: white;
            margin: 0;
        }

        header {
            padding: 20px;
            font-size: 24px;
            text-align: center;
            background: #111827;
        }

        .container {
            padding: 20px;
        }

        .kpis {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .kpi {
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            background: #1f2937;
            text-align: center;
        }

        .kpi h2 {
            margin: 0;
            font-size: 30px;
        }

        .kpi span {
            font-size: 14px;
            color: #9ca3af;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .panel {
            background: #1f2937;
            padding: 20px;
            border-radius: 10px;
        }

        .services {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .card {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .up { background: #065f46; }
        .down { background: #7f1d1d; }

        #alert {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #dc2626;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .down {
            background: #7f1d1d;
            border: 2px solid #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }
    </style>
</head>

<body>

<header>📊 Dashboard de Monitoramento</header>
<p id="lastUpdate" style="text-align:center; color:#9ca3af; margin-top:10px;"></p>

<div class="container">

    <!-- KPIs -->
    <div class="kpis">
        <div class="kpi">
            <h2 id="total">0</h2>
            <span>Total Serviços</span>
        </div>
        <div class="kpi">
            <h2 id="up">0</h2>
            <span>UP</span>
        </div>
        <div class="kpi">
            <h2 id="down">0</h2>
            <span>DOWN</span>
        </div>
        <div class="kpi">
            <h2 id="uptime">0%</h2>
            <span>Uptime</span>
        </div>
    </div>

    <div class="grid">

        <!-- Serviços -->
        <div class="panel">
            <h3>Serviços</h3>
            <div class="services" id="services"></div>
        </div>

        <!-- Gráfico -->
        <div class="panel">
            <h3>Status Geral</h3>
            <canvas id="chart"></canvas>
        </div>

    </div>

</div>

<div id="alert"></div>

<script>
let previousStatus = {};
let chart;

async function loadServices() {
    const response = await fetch("http://127.0.0.1:8000/services/");
    const data = await response.json();
    
    document.getElementById("lastUpdate").innerText =
    "Atualizado em: " + new Date().toLocaleTimeString();

    updateKPIs(data);
    renderServices(data);
    updateChart(data);
    checkAlerts(data);
}

function updateKPIs(data) {
    const total = data.length;
    const up = data.filter(s => s.status === "UP").length;
    const down = data.filter(s => s.status === "DOWN").length;

    document.getElementById("total").innerText = total;
    document.getElementById("up").innerText = up;
    document.getElementById("down").innerText = down;
    
    const uptime = total > 0 ? ((up / total) * 100).toFixed(1) : 0;
    document.getElementById("uptime").innerText = uptime + "%";
}

function renderServices(data) {
    const container = document.getElementById("services");
    container.innerHTML = "";

    data.sort((a, b) => a.status === "DOWN" ? -1 : 1);

    data.forEach(service => {
        const div = document.createElement("div");
        div.className = "card " + (service.status === "UP" ? "up" : "down");

        div.innerHTML = `
            <strong>${service.name}</strong>
            <p>${service.url}</p>
            <span style="
                padding:5px 10px;
                border-radius:5px;
                background:${service.status === 'UP' ? '#10b981' : '#ef4444'}
            ">
                ${service.status}
            </span>
        `;

        container.appendChild(div);
    });
}

function checkAlerts(data) {
    data.forEach(service => {
        const old = previousStatus[service.id];

        if (old && old !== service.status && service.status === "DOWN") {
            showAlert(`⚠️ ${service.name} caiu!`);
        }

        previousStatus[service.id] = service.status;
    });
}

function showAlert(msg) {
    const alert = document.getElementById("alert");
    alert.innerText = msg;
    alert.style.display = "block";

    setTimeout(() => {
        alert.style.display = "none";
    }, 4000);
}

function updateChart(data) {
    const up = data.filter(s => s.status === "UP").length;
    const down = data.filter(s => s.status === "DOWN").length;

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "doughnut",
        data: {
            labels: ["UP", "DOWN"],
            datasets: [{
                data: [up, down],
                backgroundColor: ["#10b981", "#ef4444"]
            }]
        }
    });
}


setInterval(loadServices, 5000);
loadServices();

</script>

</body>
</html>
